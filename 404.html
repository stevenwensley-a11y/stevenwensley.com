  /* ── DECORATIVE ELEMENT ── */

  /* ── HAMBURGER MOBILE MENU ── */
  .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; z-index: 101; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--gold, #c9a96e); margin: 5px 0; transition: all 0.3s; border-radius: 2px; }
  .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  @media (max-width: 680px) {

  /* ── SCROLL REVEAL ── */
  [data-reveal] {

  }
  [data-reveal].revealed {
    opacity: 1;

  }
  .stagger-item {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .stagger-item.revealed {
    opacity: 1;
    transform: translateY(0);

  /* ── FE3: CSS @property GRADIENT CTA ── */
  @property --grad-angle {
    syntax: '<angle>';
    initial-value: 0deg;

  .gradient-animated {
    background: linear-gradient(var(--grad-angle), var(--gold, #c9a96e), var(--gold-light, #dfc08a), #e8c97a, var(--gold, #c9a96e));

  /* ── FE4: SVG NAV LOGO ── */

  /* ── FE6: VIEW TRANSITIONS ── */

  ::view-transition-old(root) { animation: fade-out 0.2s ease; }
  ::view-transition-new(root) { animation: fade-in 0.3s ease; }
  @keyframes fade-out { to { opacity: 0; } }
  @keyframes fade-in { from { opacity: 0; } }

  /* ── REDUCED MOTION ── */
  @media (prefers-reduced-motion: reduce) {
    [data-reveal], .stagger-item { opacity: 1; transform: none; transition: none; }
    .nav-logo-svg text { stroke-dashoffset: 0; fill-opacity: 1; animation: none; }
    .gradient-animated { animation: none; }
  }

</style>

<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>

<script>
(function() {
  'use strict';
  /* Lenis smooth scroll */
  try {
    var lenis = new Lenis({ duration: 1.2, easing: function(t) { return Math.min(1, 1.001 - Math.pow(2, -10 * t)); } });
    lenis.on('scroll', function() { if (typeof ScrollTrigger !== 'undefined') ScrollTrigger.update(); });
    gsap.ticker.add(function(time) { lenis.raf(time * 1000); });
    gsap.ticker.lagSmoothing(0);
  } catch(e) {}

  /* Scroll reveal */
  try {
    var ro = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
          var items = entry.target.querySelectorAll('.stagger-item:not(.revealed)');
          items.forEach(function(item, i) { setTimeout(function() { item.classList.add('revealed'); }, 100 + i * 80); });
          ro.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('[data-reveal]').forEach(function(el) { ro.observe(el); });
  } catch(e) {}

  /* FE4: SVG logo drawn class */
  try {
    var svgText = document.querySelector('.nav-logo-svg text');
    if (svgText) setTimeout(function() { svgText.classList.add('drawn'); }, 2200);
  } catch(e) {}
})();
</script>
