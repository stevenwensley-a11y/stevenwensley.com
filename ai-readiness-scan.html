    // ─── Calculation ───
    // Each question scores 0-3. Categories are pairs: q1+q2, q3+q4, q5+q6, q7+q8, q9+q10
    // Max per category = 6, overall max = 30
    function calcResults(answers) {
      const catScores = [
        (answers[0] || 0) + (answers[1] || 0), // Strategy & Leadership
        (answers[2] || 0) + (answers[3] || 0), // Data & Infrastructure
        (answers[4] || 0) + (answers[5] || 0), // People & Culture
        (answers[6] || 0) + (answers[7] || 0), // Execution & Use Cases
        (answers[8] || 0) + (answers[9] || 0), // Governance & Risk
      ];
      const total = catScores.reduce((a, b) => a + b, 0);
      return { catScores, total, maxCat: 6, maxTotal: 30 };
    }

    function getLevel(score, max) {
      const pct = score / max;
      if (pct < 0.25) return "red";
      if (pct < 0.5) return "yellow";
      if (pct < 0.75) return "green";
      return "blue";
    }

    function getLevelLabel(level, t) {
      return { red: t.levelRed, yellow: t.levelYellow, green: t.levelGreen, blue: t.levelBlue }[level];
    }

    function getLevelColor(level) {
      return { red: "#EF4444", yellow: "#F59E0B", green: "#22C55E", blue: "#3B82F6" }[level];
    }

    function getLevelBg(level) {
      return { red: "#EF444420", yellow: "#F59E0B20", green: "#22C55E20", blue: "#3B82F620" }[level];
    }

    function getLevelEmoji(level) {
      return { red: "🔴", yellow: "🟡", green: "🟢", blue: "🔵" }[level];
    }

    // ─── PDF ───
    function generatePDF(results, answers, t, lang) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const gold = [201, 169, 110];
      const dark = [12, 12, 18];
      const white = [232, 232, 237];
      const gray = [130, 130, 155];

      doc.setFillColor(...dark);
      doc.rect(0, 0, 210, 297, 'F');
      doc.setFillColor(...gold);
      doc.rect(0, 0, 210, 3, 'F');

      doc.setFont("helvetica", "bold");
      doc.setFontSize(22);
      doc.setTextColor(...white);
      doc.text(t.resTitle, 20, 28);

      doc.setFontSize(11);
      doc.setTextColor(...gray);
      const dateStr = new Date().toLocaleDateString(lang === "da" ? "da-DK" : "en-GB");
      doc.text(lang === "da" ? `Genereret ${dateStr}` : `Generated ${dateStr}`, 20, 36);

      // Overall score box
      const overallLevel = getLevel(results.total, results.maxTotal);
      const overallPct = Math.round((results.total / results.maxTotal) * 100);
      doc.setFillColor(26, 26, 46);
      doc.roundedRect(20, 44, 170, 25, 3, 3, 'F');
      doc.setFont("helvetica", "normal");
      doc.setFontSize(12);
      doc.setTextColor(...gray);
      doc.text(t.overallLabel, 28, 56);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(28);
      doc.setTextColor(...gold);
      doc.text(`${overallPct}%`, 130, 60);
      doc.setFontSize(12);
      doc.text(getLevelLabel(overallLevel, t), 155, 60);

      // Category breakdown
      const catKeys = ["catStrategy", "catData", "catPeople", "catExecution", "catGovernance"];
      let y = 82;
      doc.setFontSize(14);
      doc.setTextColor(...white);
      doc.setFont("helvetica", "bold");
      doc.text(lang === "da" ? "Dimensioner" : "Dimensions", 20, y);
      y += 10;

      results.catScores.forEach((score, i) => {
        const level = getLevel(score, results.maxCat);
        const pct = Math.round((score / results.maxCat) * 100);
        const colors = { red: [239, 68, 68], yellow: [245, 158, 11], green: [34, 197, 94], blue: [59, 130, 246] };

        doc.setFillColor(26, 26, 46);
        doc.roundedRect(20, y, 170, 18, 2, 2, 'F');

        doc.setFont("helvetica", "bold");
        doc.setFontSize(10);
        doc.setTextColor(...white);
        doc.text(t[catKeys[i]], 25, y + 8);

        // Bar
        doc.setFillColor(30, 30, 50);
        doc.roundedRect(25, y + 11, 120, 4, 2, 2, 'F');
        doc.setFillColor(...colors[level]);
        doc.roundedRect(25, y + 11, Math.max(4, 120 * (pct / 100)), 4, 2, 2, 'F');

        doc.setFont("helvetica", "bold");
        doc.setFontSize(11);
        doc.setTextColor(...colors[level]);
        doc.text(`${pct}%`, 152, y + 12);
        doc.setFontSize(8);
        doc.text(getLevelLabel(level, t), 168, y + 12);

        y += 22;
      });

      // Recommendations
      y += 8;
      doc.setFont("helvetica", "bold");
      doc.setFontSize(14);
      doc.setTextColor(...white);
      doc.text(t.recTitle, 20, y);
      y += 8;

      const recKeys = ["recStrategy", "recData", "recPeople", "recExecution", "recGovernance"];
      results.catScores.forEach((score, i) => {
        if (score <= 3) { // Only show recs for weak areas
          const level = getLevel(score, results.maxCat);
          if (level === "red" || level === "yellow") {
            doc.setFont("helvetica", "bold");
            doc.setFontSize(9);
            doc.setTextColor(...gold);
            doc.text(`${t[catKeys[i]]}:`, 25, y);
            y += 5;
            t[recKeys[i]].forEach(rec => {
              doc.setFont("helvetica", "normal");
              doc.setFontSize(9);
              doc.setTextColor(...gray);
              doc.text(`→ ${rec}`, 30, y);
              y += 5;
            });
            y += 3;
          }
        }
      });

      // Footer
      doc.setFillColor(...gold);
      doc.rect(0, 280, 210, 0.5, 'F');
      doc.setFontSize(8);
      doc.setTextColor(...gray);
      doc.text("stevenwensley.com | steven.wensley@gmail.com | +45 5388 6061", 20, 287);
      doc.text(t.disclaimer, 20, 292);

      doc.save(lang === "da" ? "AI-Readiness-Quick-Scan.pdf" : "AI-Readiness-Quick-Scan.pdf");
    }

    function ProgressBar({ current, total }) {

          React.createElement("div", {

    function CategoryBar({ label, score, maxScore, level, levelLabel, delay }) {
      const pct = Math.round((score / maxScore) * 100);
      const color = getLevelColor(level);

        className: "slide-up",

        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 } },

            React.createElement("span", { style: { fontSize: 20, fontWeight: 800, color } }, `${pct}%`),
            React.createElement("span", {
              style: {
                fontSize: 11, fontWeight: 700, color,
                background: getLevelBg(level),
                padding: "3px 10px", borderRadius: 20, textTransform: "uppercase", letterSpacing: 0.5,
              }

          )

        React.createElement("div", { style: { background: "#0C0C12", borderRadius: 6, height: 8, overflow: "hidden" } },
          React.createElement("div", {

    }

    // ─── Main App ───
    function App() {
      const [lang, setLang] = useState("da");
      const [phase, setPhase] = useState("landing"); // landing | quiz | results
      const [qIndex, setQIndex] = useState(0);
      const [answers, setAnswers] = useState({});
      const [showLead, setShowLead] = useState(false);
      const [leadSent, setLeadSent] = useState(false);
      const formRef = useRef(null);
      const t = T[lang];

      const questions = Array.from({ length: 10 }, (_, i) => ({
        title: t[`q${i + 1}_title`],
        sub: t[`q${i + 1}_sub`],
        options: t[`q${i + 1}_options`],
      }));

      const results = useMemo(() => calcResults(answers), [answers]);
      const overallLevel = getLevel(results.total, results.maxTotal);
      const overallPct = Math.round((results.total / results.maxTotal) * 100);

      const catKeys = ["catStrategy", "catData", "catPeople", "catExecution", "catGovernance"];
      const recKeys = ["recStrategy", "recData", "recPeople", "recExecution", "recGovernance"];
