    // ─── Calculation engine ───
    const EMPLOYEE_MID = [25, 150, 625, 3000, 7500];
    const SALARY_DKK = [300000, 425000, 600000, 800000, 1000000];
    const SALARY_EUR = [40000, 57000, 80000, 107000, 135000];
    const MANUAL_HOURS = [1, 3.5, 7.5, 15, 25];
    const ENQUIRIES_MID = [50, 300, 1250, 6000, 15000];
    const REWORK_PCT = [0.01, 0.035, 0.075, 0.15, 0.25];
    const INVESTMENT_DKK = [125000, 500000, 1375000, 3500000, 7500000];
    const INVESTMENT_EUR = [16500, 66500, 185000, 470000, 1000000];

    // AI maturity affects how fast you can capture value
    const MATURITY_CAPTURE = [0.25, 0.40, 0.60, 0.75]; // % of potential captured in year 1

    // Industry efficiency multiplier (how much AI helps in this sector)
    const INDUSTRY_AI_MULT = {
      0: 1.15, // Finance — high data, high regulation
      1: 1.10, // Healthcare
      2: 0.95, // Public sector
      3: 1.05, // Manufacturing
      4: 1.10, // IT & Tech
      5: 1.05, // Retail
      6: 1.00, // Transport
      7: 0.85, // Other
    };

    // What % of workforce is directly affected by AI automation (realistic: 20-35%)
    const AFFECTED_WORKFORCE = [0.35, 0.30, 0.25, 0.22, 0.18]; // smaller orgs = higher %

    function calcResults(answers, lang) {
      const indIdx = answers[0] || 0;
      const empIdx = answers[1] || 0;
      const salIdx = answers[2] || 0;
      const manIdx = answers[3] || 0;
      const enqIdx = answers[4] || 0;
      const rewIdx = answers[5] || 0;
      const matIdx = answers[6] || 0;
      const invIdx = answers[7] || 0;

      const isEUR = lang === "en";
      const employees = EMPLOYEE_MID[empIdx];
      const avgSalary = isEUR ? SALARY_EUR[salIdx] : SALARY_DKK[salIdx];
      const manualHrs = MANUAL_HOURS[manIdx];
      const enquiries = ENQUIRIES_MID[enqIdx];
      const reworkPct = REWORK_PCT[rewIdx];
      const investment = isEUR ? INVESTMENT_EUR[invIdx] : INVESTMENT_DKK[invIdx];
      const maturityCapture = MATURITY_CAPTURE[matIdx];
      const industryMult = INDUSTRY_AI_MULT[indIdx];
      const affectedPct = AFFECTED_WORKFORCE[empIdx];

      const hourlyCost = avgSalary / 1720; // ~1720 working hours/year
      const totalPayroll = employees * avgSalary;
      const affectedEmployees = Math.round(employees * affectedPct);

      // 1. Automation savings: reduce manual hours by 30% for affected workforce
      const automationRate = 0.30;
      const weeklyHoursSaved = affectedEmployees * manualHrs * automationRate;
      const automationSavings = Math.round(weeklyHoursSaved * 46 * hourlyCost * industryMult);

      // 2. Customer handling: 25% faster resolution → cost per enquiry reduction
      const costPerEnquiry = isEUR ? 12 : 90; // average handling cost
      const resolutionImprovement = 0.25;
      const customerSavings = Math.round(enquiries * 12 * costPerEnquiry * resolutionImprovement * industryMult);

      // 3. Error reduction: reduce rework by 40% for affected processes
      const errorReductionRate = 0.40;
      const reworkSavings = Math.round(totalPayroll * affectedPct * reworkPct * errorReductionRate * industryMult);

      // 4. Decision intelligence: 1.5-2% operational efficiency gain
      const decisionGainRate = 0.018;
      const decisionSavings = Math.round(totalPayroll * affectedPct * decisionGainRate * industryMult);

      // Apply maturity capture rate (year 1)
      const totalPotentialSavings = automationSavings + customerSavings + reworkSavings + decisionSavings;
      const yr1Savings = Math.round(totalPotentialSavings * maturityCapture);

      // Compliance cost (10-15% of AI investment recommended)
      const complianceCost = Math.round(investment * 0.12);

      // Total investment including compliance
      const totalInvestment = investment + complianceCost;

      // ROI and payback
      const netBenefit = yr1Savings - totalInvestment;
      const roi = totalInvestment > 0 ? Math.round((netBenefit / totalInvestment) * 100) : 0;
      const paybackMonths = yr1Savings > 0 ? Math.max(1, Math.round((totalInvestment / yr1Savings) * 12)) : 99;

      // 3-year projection (year 2: +30% as AI matures, year 3: +20% more)
      const yr2Savings = Math.round(yr1Savings * 1.35);
      const yr3Savings = Math.round(yr2Savings * 1.25);
      const yr2Net = yr2Savings - Math.round(investment * 0.25); // 25% ongoing cost
      const yr3Net = yr3Savings - Math.round(investment * 0.20);
      const cumulative3yr = netBenefit + yr2Net + yr3Net;

      return {
        investment,
        complianceCost,
        totalInvestment,
        automationSavings: Math.round(automationSavings * maturityCapture),
        customerSavings: Math.round(customerSavings * maturityCapture),
        reworkSavings: Math.round(reworkSavings * maturityCapture),
        decisionSavings: Math.round(decisionSavings * maturityCapture),
        yr1Savings,
        netBenefit,
        roi,
        paybackMonths,
        yr2Savings,
        yr3Savings,
        yr2Net,
        yr3Net,
        cumulative3yr,
        currency: isEUR ? "€" : "DKK",
      };
    }

    function fmtNum(n, currency) {
      const abs = Math.abs(n);
      const sign = n < 0 ? "-" : "";
      if (currency === "€") {
        if (abs >= 1000000) return sign + "€" + (abs / 1000000).toFixed(1) + "M";
        if (abs >= 1000) return sign + "€" + Math.round(abs / 1000) + "K";
        return sign + "€" + abs;
      }
      if (abs >= 1000000) return sign + (abs / 1000000).toFixed(1) + " mio. DKK";
      if (abs >= 1000) return sign + Math.round(abs / 1000).toLocaleString("da-DK") + ".000 DKK";
      return sign + abs + " DKK";
    }

    function fmtShort(n, currency) {
      const abs = Math.abs(n);
      const sign = n < 0 ? "-" : "+";
      if (currency === "€") {
        if (abs >= 1000000) return sign + "€" + (abs / 1000000).toFixed(1) + "M";
        if (abs >= 1000) return sign + "€" + Math.round(abs / 1000) + "K";
        return sign + "€" + abs;
      }
      if (abs >= 1000000) return sign + (abs / 1000000).toFixed(1) + " mio.";
      if (abs >= 1000) return sign + Math.round(abs / 1000) + "K";
      return sign + abs;
    }

    // ─── PDF Generation ───
    function generatePDF(results, t, lang) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const gold = [201, 169, 110];
      const dark = [12, 12, 18];
      const white = [232, 232, 237];
      const gray = [130, 130, 155];
      const green = [34, 197, 94];

      doc.setFillColor(...dark);
      doc.rect(0, 0, 210, 297, 'F');
      doc.setFillColor(...gold);
      doc.rect(0, 0, 210, 3, 'F');

      doc.setFont("helvetica", "bold");
      doc.setFontSize(22);
      doc.setTextColor(...white);
      doc.text(t.resHeadline, 20, 28);

      doc.setFontSize(11);
      doc.setTextColor(...gray);
      const dateStr = new Date().toLocaleDateString(lang === "da" ? "da-DK" : "en-GB");
      doc.text(lang === "da" ? `Genereret ${dateStr}` : `Generated ${dateStr}`, 20, 36);

      // ROI hero box
      doc.setFillColor(26, 26, 46);
      doc.roundedRect(20, 44, 170, 38, 3, 3, 'F');
      doc.setFillColor(...(results.roi > 0 ? green : [239, 68, 68]));
      doc.rect(20, 44, 170, 3, 'F');

      doc.setFont("helvetica", "bold");
      doc.setFontSize(28);
      doc.setTextColor(...(results.roi > 0 ? green : [239, 68, 68]));
      doc.text(`${results.roi}% ${t.roiLabel}`, 30, 62);

              {savItems.map((item, idx) => (
                <div key={idx} style={{ ...cardStyle, marginBottom: 12 }} className="slide-up">
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontSize: 20 }}>{item.icon}</span>
                      <span style={{ fontSize: 15, fontWeight: 600, color: "#E8E8ED" }}>{item.title}</span>
                    </div>
                    <span style={{ fontSize: 18, fontWeight: 700, color: item.color, fontFamily: "'DM Serif Display', serif" }}>
                      {fmtNum(item.value, results.currency)}
                    </span>
                  </div>
                  <div style={{ width: "100%", height: 6, background: "#1E1E30", borderRadius: 3, overflow: "hidden", marginBottom: 8 }}>
                    <div className="bar-grow" style={{ height: "100%", width: `${Math.max(3, (item.value / maxSav) * 100)}%`, background: item.color, borderRadius: 3 }} />
                  </div>
                  <p style={{ fontSize: 12, color: "#6B6B8A", lineHeight: 1.4 }}>{item.desc}</p>
                </div>
              ))}

              {/* Compliance note */}
              <div style={{ ...cardStyle, borderColor: "#C9A96E44", borderLeft: "3px solid #C9A96E", marginTop: 20 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontSize: 14, fontWeight: 600, color: "#C9A96E" }}>⚖️ {t.complianceTitle}</span>
                  <span style={{ fontSize: 16, fontWeight: 700, color: "#C9A96E", fontFamily: "'DM Serif Display', serif" }}>{fmtNum(results.complianceCost, results.currency)}</span>
                </div>
                <p style={{ fontSize: 12, color: "#8888AA", lineHeight: 1.4 }}>{t.complianceDesc} (12% {t.compliancePct})</p>
                <p style={{ fontSize: 11, color: "#EF4444", marginTop: 6, fontWeight: 500 }}>{t.complianceNote}</p>
              </div>

              {/* 3-year projection */}
              <h3 style={{ fontFamily: "'DM Serif Display', serif", fontSize: 22, fontWeight: 700, marginBottom: 20, marginTop: 32, color: "#fff" }}>{t.projTitle}</h3>

              <div style={{ ...cardStyle, padding: "28px 24px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", height: 160, gap: 16, marginBottom: 16 }}>
                  {yr.map((y, idx) => (
                    <div key={idx} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%", justifyContent: "flex-end" }}>
                      <span style={{ fontSize: 12, fontWeight: 600, color: "#22C55E", marginBottom: 6 }}>{fmtShort(y.savings, results.currency)}</span>
                      <div className="grow-in" style={{
                        width: "100%",
                        maxWidth: 80,
                        height: `${Math.max(10, (y.savings / maxYr) * 120)}px`,
                        background: `linear-gradient(180deg, #22C55E${idx === 0 ? "88" : idx === 1 ? "AA" : "CC"} 0%, #22C55E${idx === 0 ? "33" : idx === 1 ? "55" : "77"} 100%)`,
                        borderRadius: "6px 6px 0 0",
                      }} />
                      <span style={{ fontSize: 13, fontWeight: 600, color: "#E8E8ED", marginTop: 8 }}>{y.label}</span>
                      <span style={{ fontSize: 11, color: "#8888AA", marginTop: 2 }}>{lang === "da" ? "netto" : "net"}: {fmtShort(y.net, results.currency)}</span>
                    </div>
                  ))}
                </div>
                <div style={{ borderTop: "1px solid #1E1E30", paddingTop: 12, textAlign: "center" }}>
                  <span style={{ fontSize: 12, color: "#8888AA" }}>{t.cumulativeLabel}: </span>
                  <span style={{ fontSize: 18, fontWeight: 700, color: "#22C55E", fontFamily: "'DM Serif Display', serif" }}>{fmtNum(results.cumulative3yr, results.currency)}</span>
                </div>
              </div>

              {/* CTA */}
              <div style={{ ...cardStyle, marginTop: 32, textAlign: "center", borderColor: "#C9A96E44" }}>
                {!showLead && !leadSent && (
                  <>
                    <h3 style={{ fontFamily: "'DM Serif Display', serif", fontSize: 20, fontWeight: 700, color: "#fff", marginBottom: 8 }}>{t.ctaTitle}</h3>
                    <p style={{ fontSize: 14, color: "#8888AA", marginBottom: 20 }}>{t.ctaText}</p>
                    <a href="https://calendly.com/steven-wensley/30min" target="_blank" rel="noopener" style={{ ...goldBtn, display: "inline-block", textDecoration: "none", textAlign: "center", marginBottom: 12 }}>
                      {t.ctaBtn}
                    </a>
                    <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 12, flexWrap: "wrap" }}>
                      <button onClick={handlePdfClick} style={outlineBtn}>{t.downloadBtn} ↓</button>
                      <a href="/cost-of-inaction.html" style={{ ...outlineBtn, textDecoration: "none", display: "inline-block" }}>{t.costBtn} →</a>
                    </div>
                    <div style={{ marginTop: 8 }}>
                      <a href="/ai-governance-assessment.html" style={{ ...outlineBtn, textDecoration: "none", display: "inline-block", fontSize: 12 }}>{t.assessBtn} →</a>
                    </div>
                  </>
                )}

                {showLead && !leadSent && (
                  <form onSubmit={submitLead} className="fade-in">
                    <h4 style={{ fontSize: 16, fontWeight: 600, color: "#fff", marginBottom: 4 }}>{t.leadTitle}</h4>
                    <p style={{ fontSize: 12, color: "#8888AA", marginBottom: 16 }}>{t.leadSub}</p>
                    <input type="email" required value={email} onChange={e => setEmail(e.target.value)} placeholder={t.emailPlaceholder} style={{ width: "100%", padding: "12px 16px", borderRadius: 8, border: "1px solid #1E1E30", background: "#0C0C12", color: "#E8E8ED", fontSize: 14, marginBottom: 10 }} />
                    <input type="text" value={company} onChange={e => setCompany(e.target.value)} placeholder={t.companyPlaceholder} style={{ width: "100%", padding: "12px 16px", borderRadius: 8, border: "1px solid #1E1E30", background: "#0C0C12", color: "#E8E8ED", fontSize: 14, marginBottom: 16 }} />
                    <button type="submit" style={goldBtn}>{t.sendBtn}</button>
                    <button type="button" onClick={() => { setShowLead(false); downloadPDF(); }} style={{ ...outlineBtn, marginTop: 10, width: "100%" }}>{t.skipBtn}</button>
                  </form>
                )}

                {leadSent && (
                  <div className="fade-in">
                    <div style={{ fontSize: 32, marginBottom: 8 }}>✅</div>
                    <p style={{ fontSize: 14, color: "#22C55E", fontWeight: 600 }}>{t.thankYou}</p>
                  </div>
                )}
              </div>

              <p style={{ fontSize: 10, color: "#555", textAlign: "center", marginTop: 24, lineHeight: 1.5 }}>
                {t.disclaimer}
              </p>
            </div>
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ROICalculator />);
  </script>

<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>

<script>
(function() {
  'use strict';
  /* Lenis smooth scroll */
  try {
    var lenis = new Lenis({ duration: 1.2, easing: function(t) { return Math.min(1, 1.001 - Math.pow(2, -10 * t)); } });
    lenis.on('scroll', function() { if (typeof ScrollTrigger !== 'undefined') ScrollTrigger.update(); });
    gsap.ticker.add(function(time) { lenis.raf(time * 1000); });
    gsap.ticker.lagSmoothing(0);
  } catch(e) {}

  /* Scroll reveal */
  try {
    var ro = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
          var items = entry.target.querySelectorAll('.stagger-item:not(.revealed)');
          items.forEach(function(item, i) { setTimeout(function() { item.classList.add('revealed'); }, 100 + i * 80); });
          ro.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('[data-reveal]').forEach(function(el) { ro.observe(el); });
  } catch(e) {}

  /* FE4: SVG logo drawn class */
  try {
    var svgText = document.querySelector('.nav-logo-svg text');
    if (svgText) setTimeout(function() { svgText.classList.add('drawn'); }, 2200);
  } catch(e) {}
})();
</script>
